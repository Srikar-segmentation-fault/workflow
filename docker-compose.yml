version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: workflow-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: workflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d workflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: workflow-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # If running on macOS, Ollama container can't easily access Apple Silicon GPU
    # unless run natively. We will recommend running Ollama natively on macOS for speed,
    # but provide this docker container as a fallback.

volumes:
  postgres_data:
  ollama_data:
